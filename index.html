<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aspac</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    body {
      margin: 0;
      font-family: 'Kanit', sans-serif;
      background: url('https://images.unsplash.com/photo-1508675801627-066ac4346a24?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
      background-size: cover;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      animation: backgroundFade 10s infinite alternate;
      overflow: hidden;
    }

    @keyframes backgroundFade {
      0% {
        filter: brightness(1);
      }
      100% {
        filter: brightness(1.2);
      }
    }

    .card {
      background: rgba(0, 0, 0, 0.7);
      padding: 2rem 2rem 3rem 2rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
      max-width: 400px;
      animation: floatUpDown 4s ease-in-out infinite;
      position: relative;
    }

    @keyframes floatUpDown {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px #00ffd0;
      }
      to {
        text-shadow: 0 0 20px #00ffd0, 0 0 30px #00ffd0;
      }
    }

    p {
      font-size: 1.1rem;
      font-weight: 300;
      margin-bottom: 1.5rem;
    }

    .profile-pic {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
      margin: 0 auto 1.5rem auto;
      border: 4px solid #00ffd0;
      box-shadow: 0 0 20px #00ffd0;
      animation: glowPic 2s ease-in-out infinite alternate;
      display: block;
    }

    @keyframes glowPic {
      from {
        box-shadow: 0 0 10px #00ffd0;
      }
      to {
        box-shadow: 0 0 25px #00ffd0, 0 0 40px #00ffd0;
      }
    }

    .socials a {
      margin: 0 10px;
      text-decoration: none;
      color: white;
      font-size: 1.4rem;
    }

    .socials img {
      width: 32px;
      vertical-align: middle;
      transition: transform 0.3s;
    }

    .socials img:hover {
      transform: scale(1.2);
    }

    .btn, .music-btn {
      display: inline-block;
      margin-top: 1.2rem;
      padding: 10px 20px;
      background: #00ffd0;
      color: #000;
      border-radius: 999px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
      box-shadow: 0 0 10px #00ffd0;
      cursor: pointer;
    }

    .btn:hover, .music-btn:hover {
      background: white;
      color: black;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://avatars.githubusercontent.com/u/9919?s=280&v=4" alt="Profile Pic" class="profile-pic" />
    <h1>Hi! My name is Noppanat</h1>
    <p>Chill</p>
    <div class="socials">
      <a href="https://discord.com/channels/@me" target="_blank"><img src="https://img.icons8.com/ios-filled/50/ffffff/discord-logo.png" alt="Discord" /></a>
      <a href="https://www.tiktok.com/@unzerox1xd" target="_blank"><img src="https://img.icons8.com/ios-filled/50/ffffff/tiktok.png" alt="TikTok" /></a>
      <a href="https://www.roblox.com/users/2684214679/profile" target="_blank"><img src="https://img.icons8.com/ios-filled/50/ffffff/roblox.png" alt="Roblox" /></a>
    </div>
    <a href="#contact" class="btn">ติดต่อเรา</a>
    <button class="music-btn" onclick="toggleMusic()">▶️ เปิดเพลง</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://cdn.discordapp.com/attachments/1392816241651089539/1396111783059783740/Stuck.mp3?ex=687ce5eb&is=687b946b&hm=37b59af8f8803c9aa01ff819dbf938db295cdc103d3665d6ac577eba853ef6eb&" type="audio/mpeg" />
  </audio>

  <script>
    const music = document.getElementById('bgMusic');
    let isPlaying = false;

    function toggleMusic() {
      if (!isPlaying) {
        music.play();
        isPlaying = true;
        document.querySelector('.music-btn').textContent = '⏸️ หยุดเพลง';
      } else {
        music.pause();
        isPlaying = false;
        document.querySelector('.music-btn').textContent = '▶️ เปิดเพลง';
      }
    }
  </script>
</body>
</html>
